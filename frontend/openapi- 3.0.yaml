openapi: 3.0.3
info:
  title: Therapist Closed Community API
  version: 1.0.0
  description: |-
    폐쇄형(치료사 전용) 커뮤니티 API.

    인증:
    - Access Token: Authorization: Bearer <JWT>
    - Refresh Token: /auth/refresh

    역할:
    - USER: 로그인 완료(치료사 인증 전)
    - THERAPIST: 인증 승인 완료(게시판 접근 가능)
    - ADMIN: 관리자(심사/로그 접근) + THERAPIST 권한 포함 권장

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: Meta
  - name: Auth
  - name: Me
  - name: TherapistVerification
  - name: Admin
  - name: Posts
  - name: Comments
  - name: Reactions
  - name: Home

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    UnauthorizedError:
      description: Unauthorized (JWT 누락/만료/위조)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Forbidden (권한 부족: USER가 게시판 접근 등)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Conflict (중복/상태 충돌)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        path: { type: string }
        code: { type: string }
        message: { type: string }
        fieldErrors: { type: array, items: { $ref: "#/components/schemas/FieldError" } }
      required: [timestamp, path, code, message]

    FieldError:
      type: object
      properties:
        field: { type: string }
        reason: { type: string }

    PageMeta:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer }
        totalPages: { type: integer }
        hasNext: { type: boolean }
      required: [page, size, totalElements, totalPages, hasNext]

    UserRole:
      type: string
      enum: [USER, THERAPIST, ADMIN]

    TherapistVerifStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    ReactionType:
      type: string
      enum: [LIKE, DISLIKE]

    AgeGroup:
      type: string
      enum: [UNSPECIFIED, AGE_0_2, AGE_3_5, AGE_6_12, AGE_13_18, AGE_19_64, AGE_65_PLUS]

    TherapyArea:
      type: string
      enum: [UNSPECIFIED, OCCUPATIONAL_THERAPY, SPEECH_THERAPY, COGNITIVE_THERAPY, PLAY_THERAPY]

    BoardType:
      type: string
      enum: [therapy_board, document_board, anonymous_board]

    PostSort:
      type: string
      enum: [LATEST, MOST_VIEWED]

    MetaOptionsResponse:
      type: object
      properties:
        boardTypes: { type: array, items: { $ref: "#/components/schemas/BoardType" } }
        therapyAreas: { type: array, items: { $ref: "#/components/schemas/TherapyArea" } }
        ageGroups: { type: array, items: { $ref: "#/components/schemas/AgeGroup" } }
        reactionTypes: { type: array, items: { $ref: "#/components/schemas/ReactionType" } }
      required: [boardTypes, therapyAreas, ageGroups, reactionTypes]

    UserSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        nickname: { type: string }
        profileImageUrl: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/UserRole" }
      required: [id, nickname, role]

    TherapistVerificationMyStatus:
      type: object
      nullable: true
      properties:
        id: { type: integer, format: int64 }
        status: { $ref: "#/components/schemas/TherapistVerifStatus" }
        createdAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time, nullable: true }
        rejectReason: { type: string, nullable: true }

    MeResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        nickname: { type: string }
        profileImageUrl: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/UserRole" }
        canAccessCommunity: { type: boolean }
        therapistVerification: { $ref: "#/components/schemas/TherapistVerificationMyStatus" }
      required: [id, email, nickname, role, canAccessCommunity]

    UpdateMeRequest:
      type: object
      properties:
        nickname: { type: string }
        profileImageUrl: { type: string, nullable: true }

    Tokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        accessTokenExpiresInSec: { type: integer }
        refreshTokenExpiresInSec: { type: integer }
      required: [accessToken, refreshToken]

    AuthResponse:
      type: object
      properties:
        isNewUser: { type: boolean }
        user: { $ref: "#/components/schemas/MeResponse" }
        tokens: { $ref: "#/components/schemas/Tokens" }
      required: [isNewUser, user, tokens]

    SignupRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
        nickname: { type: string }
      required: [email, password, nickname]

    LoginRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    GoogleLoginRequest:
      type: object
      properties:
        idToken: { type: string }
      required: [idToken]

    RefreshRequest:
      type: object
      properties:
        refreshToken: { type: string }
      required: [refreshToken]

    LogoutRequest:
      type: object
      properties:
        refreshToken: { type: string }
      required: [refreshToken]

    TherapistVerificationApplyRequest:
      type: object
      properties:
        licenseCode: { type: string }
      required: [licenseCode]

    TherapistVerificationResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        status: { $ref: "#/components/schemas/TherapistVerifStatus" }
        createdAt: { type: string, format: date-time }
        reviewedBy: { type: integer, format: int64, nullable: true }
        reviewedAt: { type: string, format: date-time, nullable: true }
        rejectReason: { type: string, nullable: true }
      required: [id, userId, status, createdAt]

    AdminRejectRequest:
      type: object
      properties:
        rejectReason: { type: string }
      required: [rejectReason]

    PostCreateRequest:
      type: object
      properties:
        board: { $ref: "#/components/schemas/BoardType" }
        title: { type: string }
        content: { type: string }
        therapyArea: { $ref: "#/components/schemas/TherapyArea" }
        ageGroup: { $ref: "#/components/schemas/AgeGroup" }
      required: [board, title, content]

    PostUpdateRequest:
      type: object
      properties:
        title: { type: string }
        content: { type: string }
        therapyArea: { $ref: "#/components/schemas/TherapyArea" }
        ageGroup: { $ref: "#/components/schemas/AgeGroup" }

    PostSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        board: { $ref: "#/components/schemas/BoardType" }
        title: { type: string }
        therapyArea: { $ref: "#/components/schemas/TherapyArea" }
        ageGroup: { $ref: "#/components/schemas/AgeGroup" }
        viewCount: { type: integer, format: int64 }
        commentCount: { type: integer }
        likeCount: { type: integer }
        dislikeCount: { type: integer }
        author: { $ref: "#/components/schemas/UserSummary" }
        createdAt: { type: string, format: date-time }
      required: [id, board, title, viewCount, commentCount, likeCount, dislikeCount, author, createdAt]

    PostDetail:
      allOf:
        - $ref: "#/components/schemas/PostSummary"
        - type: object
          properties:
            content: { type: string }
            updatedAt: { type: string, format: date-time }
            myReactionType: { $ref: "#/components/schemas/ReactionType", nullable: true }
            scrapped: { type: boolean }
          required: [content, scrapped]

    PaginatedPosts:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/PostSummary" } }
        page: { $ref: "#/components/schemas/PageMeta" }
      required: [items, page]

    CommentCreateRequest:
      type: object
      properties:
        content: { type: string }
        parentCommentId: { type: integer, format: int64, nullable: true }
      required: [content]

    CommentUpdateRequest:
      type: object
      properties:
        content: { type: string }
      required: [content]

    CommentResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        postId: { type: integer, format: int64 }
        author: { $ref: "#/components/schemas/UserSummary" }
        parentCommentId: { type: integer, format: int64, nullable: true }
        content: { type: string, nullable: true }
        deleted: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, postId, author, deleted, createdAt, updatedAt]

    UpsertReactionRequest:
      type: object
      properties:
        reactionType: { $ref: "#/components/schemas/ReactionType" }
      required: [reactionType]

    MyReactionResponse:
      type: object
      properties:
        reactionType: { $ref: "#/components/schemas/ReactionType", nullable: true }
      required: [reactionType]

    ScrapStatusResponse:
      type: object
      properties:
        scrapped: { type: boolean }
      required: [scrapped]

    PaginatedScraps:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/PostSummary" } }
        page: { $ref: "#/components/schemas/PageMeta" }
      required: [items, page]

    PaginatedTherapistVerifications:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/TherapistVerificationResponse" } }
        page: { $ref: "#/components/schemas/PageMeta" }
      required: [items, page]

    AdminLog:
      type: object
      properties:
        id: { type: integer, format: int64 }
        adminId: { type: integer, format: int64 }
        action: { type: string }
        targetUserId: { type: integer, format: int64, nullable: true }
        therapistVerificationId: { type: integer, format: int64, nullable: true }
        memo: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, adminId, action, createdAt]

    PaginatedAdminLogs:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/AdminLog" } }
        page: { $ref: "#/components/schemas/PageMeta" }
      required: [items, page]

    HomeSectionKey:
      type: string
      enum: [POPULAR_THERAPY, WEEKLY_DOCUMENTS, LATEST_ANONYMOUS]

    HomeViewer:
      type: object
      properties:
        authenticated: { type: boolean }
        role: { $ref: "#/components/schemas/UserRole", nullable: true }
        nickname: { type: string, nullable: true }
        profileImageUrl: { type: string, nullable: true }
        canAccessCommunity: { type: boolean }
        therapistVerification: { $ref: "#/components/schemas/TherapistVerificationMyStatus" }
      required: [authenticated, canAccessCommunity]

    HomeSection:
      type: object
      properties:
        key: { $ref: "#/components/schemas/HomeSectionKey" }
        title: { type: string }
        board: { $ref: "#/components/schemas/BoardType" }
        sort: { $ref: "#/components/schemas/PostSort" }
        locked: { type: boolean }
        lockedReason: { type: string, nullable: true }
        placeholderCount: { type: integer }
        items: { type: array, items: { $ref: "#/components/schemas/PostSummary" } }
      required: [key, title, board, sort, locked, placeholderCount, items]

    HomeResponse:
      type: object
      properties:
        viewer: { $ref: "#/components/schemas/HomeViewer" }
        sections: { type: array, items: { $ref: "#/components/schemas/HomeSection" } }
      required: [viewer, sections]

paths:
  /meta/options:
    get:
      tags: [Meta]
      summary: 옵션 목록 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MetaOptionsResponse" }

  /auth/signup:
    post:
      tags: [Auth]
      summary: 이메일 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409":
          $ref: "#/components/responses/ConflictError"

  /auth/login:
    post:
      tags: [Auth]
      summary: 이메일 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/oauth/google:
    post:
      tags: [Auth]
      summary: 구글 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoogleLoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 갱신
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tokens" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /me:
    get:
      tags: [Me]
      summary: 내 정보 조회
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    patch:
      tags: [Me]
      summary: 내 프로필 수정
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /me/posts:
    get:
      tags: [Me]
      summary: 내가 작성한 게시글
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedPosts" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /me/scraps:
    get:
      tags: [Me]
      summary: 내 스크랩 목록
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedScraps" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /therapist-verifications:
    post:
      tags: [TherapistVerification]
      summary: 치료사 인증 신청
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TherapistVerificationApplyRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TherapistVerificationResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /therapist-verifications/me:
    get:
      tags: [TherapistVerification]
      summary: 내 인증 상태
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TherapistVerificationMyStatus" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /admin/therapist-verifications:
    get:
      tags: [Admin]
      summary: 인증 신청 목록(관리자)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/TherapistVerifStatus" }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedTherapistVerifications" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /admin/therapist-verifications/{verificationId}/approve:
    post:
      tags: [Admin]
      summary: 인증 승인(관리자)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: verificationId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TherapistVerificationResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /admin/therapist-verifications/{verificationId}/reject:
    post:
      tags: [Admin]
      summary: 인증 거절(관리자)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: verificationId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminRejectRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TherapistVerificationResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /admin/logs:
    get:
      tags: [Admin]
      summary: 관리자 로그
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedAdminLogs" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /posts:
    get:
      tags: [Posts]
      summary: 게시글 목록
      security: [{ BearerAuth: [] }]
      parameters:
        - name: board
          in: query
          schema: { $ref: "#/components/schemas/BoardType" }
        - name: therapyArea
          in: query
          schema: { $ref: "#/components/schemas/TherapyArea" }
        - name: ageGroup
          in: query
          schema: { $ref: "#/components/schemas/AgeGroup" }
        - name: sort
          in: query
          schema: { $ref: "#/components/schemas/PostSort" }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedPosts" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      tags: [Posts]
      summary: 게시글 작성
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostDetail" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /posts/{postId}:
    get:
      tags: [Posts]
      summary: 게시글 상세
      security: [{ BearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostDetail" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [Posts]
      summary: 게시글 수정
      security: [{ BearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostUpdateRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostDetail" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      tags: [Posts]
      summary: 게시글 삭제
      security: [{ BearerAuth: [] }]
      parameters:
        - name: postId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
