      window.dataLayer = window.dataLayer || [];
      // gtag 함수 본체 — 모든 호출을 dataLayer에 밀어 넣음 (실제 전송은 googletagmanager 스크립트가 처리)
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      // 'config'로 측정 ID 등록 → 이 시점에 자동으로 page_view 1회 발송됨
      gtag('config', 'G-7VPMPFL76M');
