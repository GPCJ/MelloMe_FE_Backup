<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Search Console 소유권 확인용 (삭제하면 Search Console 연결 해제됨) -->
    <meta name="google-site-verification" content="cZuyZEZ9eWZ_1HbxFXHDQfVDp7wWJMQlSxkcwbE10ug" />

    <!-- Google Analytics 4: 트래픽·유입·체류시간 측정 -->
    <!-- async: 메인 스레드 블로킹 없이 스크립트 다운로드, 다운로드 완료되면 실행 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7VPMPFL76M"></script>
    <script>
      // window.dataLayer: gtag가 스크립트 로드 전에 호출돼도 큐잉해두는 배열
      window.dataLayer = window.dataLayer || [];
      // gtag 함수 본체 — 모든 호출을 dataLayer에 밀어 넣음 (실제 전송은 googletagmanager 스크립트가 처리)
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      // 'config'로 측정 ID 등록 → 이 시점에 자동으로 page_view 1회 발송됨
      gtag('config', 'G-7VPMPFL76M');
    </script>

    <!-- Microsoft Clarity: 히트맵 + 세션 녹화 (SPA 라우트 자동 감지) -->
    <script type="text/javascript">
      (function (c, l, a, r, i, t, y) {
        c[a] =
          c[a] ||
          function () {
            (c[a].q = c[a].q || []).push(arguments);
          };
        t = l.createElement(r);
        t.async = 1;
        t.src = 'https://www.clarity.ms/tag/' + i;
        y = l.getElementsByTagName(r)[0];
        y.parentNode.insertBefore(t, y);
      })(window, document, 'clarity', 'script', 'wg3vefhmgy');
    </script>

    <!--
      SEO 메타(title/description/canonical/og:*/twitter:*)는 prerender(`src/prerender.tsx`)에서
      페이지별로 주입함. 정적 prerender 대상은 `/`, `/privacy`, `/terms` 3개. 그 외 라우트는 SPA로
      동작하며 보통 noindex 대상(로그인/회원가입/게시물 등 인증 필요 페이지)이라 SEO 태그 미주입 OK.
      여기서 hardcode하면 prerender append 결과와 중복돼 canonical 충돌이 생기므로 제거함.
    -->
    <title>멜로미</title>
    <!-- og:image, twitter:card 등 공통 자산은 디자이너 OG 이미지(1200x630) 수령 후 prerender에서 페이지별로 주입 예정 -->

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
