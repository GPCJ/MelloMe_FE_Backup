openapi: 3.0.3
info:
  title: Therapist Closed Community API
  version: 1.0.0
  description: |-
    폐쇄형(치료사 전용) 커뮤니티 API.

    인증:
    - Access Token: Authorization: Bearer <JWT>
    - Refresh Token: /auth/refresh

    역할:
    - USER: 로그인 완료(치료사 인증 전)
    - THERAPIST: 인증 승인 완료(게시판 접근 가능)
    - ADMIN: 관리자(심사/로그 접근) + THERAPIST 권한 포함 권장

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: Meta
  - name: Auth
  - name: Me
  - name: TherapistVerification
  - name: Admin
  - name: Posts
  - name: Comments
  - name: Reactions
  - name: Scraps
  - name: Home

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    UnauthorizedError:
      description: Unauthorized (JWT 누락/만료/위조)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Forbidden (권한 부족: USER가 게시판 접근 등)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Conflict (중복/상태 충돌)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ---------- Common ----------
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-02-26T10:15:30Z"
        path:
          type: string
          example: "/api/v1/posts"
        code:
          type: string
          example: "AUTH_403_THERAPIST_REQUIRED"
        message:
          type: string
          example: "Therapist verification is required."
        fieldErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
      required: [timestamp, path, code, message]

    FieldError:
      type: object
      properties:
        field:
          type: string
          example: "email"
        reason:
          type: string
          example: "must be a well-formed email address"

    PageMeta:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 123
        totalPages:
          type: integer
          example: 7
        hasNext:
          type: boolean
          example: true
      required: [page, size, totalElements, totalPages, hasNext]

    # ---------- Enums ----------
    UserRole:
      type: string
      enum: [USER, THERAPIST, ADMIN]

    OauthProvider:
      type: string
      enum: [GOOGLE]

    TherapistVerifStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    ReactionType:
      type: string
      enum: [LIKE, DISLIKE]

    AgeGroup:
      type: string
      enum:
        - UNSPECIFIED
        - AGE_0_2
        - AGE_3_5
        - AGE_6_12
        - AGE_13_18
        - AGE_19_64
        - AGE_65_PLUS

    TherapyArea:
      type: string
      enum:
        - UNSPECIFIED
        - OCCUPATIONAL_THERAPY
        - SPEECH_THERAPY
        - COGNITIVE_THERAPY
        - PLAY_THERAPY

    BoardType:
      type: string
      enum: [therapy_board, document_board, anonymous_board]

    PostSort:
      type: string
      enum: [LATEST, MOST_VIEWED]
      description: LATEST=최신순, MOST_VIEWED=조회수순

    # ---------- Meta ----------
    MetaOptionsResponse:
      type: object
      properties:
        boardTypes:
          type: array
          items: { $ref: "#/components/schemas/BoardType" }
        therapyAreas:
          type: array
          items: { $ref: "#/components/schemas/TherapyArea" }
        ageGroups:
          type: array
          items: { $ref: "#/components/schemas/AgeGroup" }
        reactionTypes:
          type: array
          items: { $ref: "#/components/schemas/ReactionType" }
      required: [boardTypes, therapyAreas, ageGroups, reactionTypes]

    # ---------- User / Me ----------
    UserSummary:
      type: object
      properties:
        id: { type: integer, format: int64, example: 1 }
        nickname: { type: string, example: "홍길동" }
        profileImageUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/p/1.png"
        role:
          $ref: "#/components/schemas/UserRole"
      required: [id, nickname, role]

    TherapistVerificationMyStatus:
      type: object
      nullable: true
      description: 최근(또는 현재) 치료사 인증 상태. 신청 이력이 없으면 null.
      properties:
        id: { type: integer, format: int64 }
        status: { $ref: "#/components/schemas/TherapistVerifStatus" }
        createdAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time, nullable: true }
        rejectReason: { type: string, nullable: true }

    MeResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string, example: "user@example.com" }
        nickname: { type: string, example: "홍길동" }
        profileImageUrl: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/UserRole" }
        canAccessCommunity:
          type: boolean
          description: role이 THERAPIST 또는 ADMIN이면 true
          example: false
        therapistVerification:
          $ref: "#/components/schemas/TherapistVerificationMyStatus"
      required: [id, email, nickname, role, canAccessCommunity]

    UpdateMeRequest:
      type: object
      properties:
        nickname: { type: string, example: "새닉네임" }
        profileImageUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/p/1-new.png"

    # ---------- Auth ----------
    Tokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        accessTokenExpiresInSec: { type: integer, example: 1800 }
        refreshTokenExpiresInSec: { type: integer, example: 1209600 }
      required: [accessToken, refreshToken]

    AuthResponse:
      type: object
      properties:
        isNewUser:
          type: boolean
          description: "소셜 로그인에서 신규 생성인지 여부(온보딩 모달 판단용). 이메일 회원가입은 항상 true."
          example: true
        user: { $ref: "#/components/schemas/MeResponse" }
        tokens: { $ref: "#/components/schemas/Tokens" }
      required: [isNewUser, user, tokens]

    SignupRequest:
      type: object
      properties:
        email: { type: string, example: "user@example.com" }
        password: { type: string, example: "P@ssw0rd!" }
        nickname: { type: string, example: "홍길동" }
      required: [email, password, nickname]

    LoginRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    GoogleLoginRequest:
      type: object
      description: 프론트에서 Google Sign-In으로 받은 ID Token을 전달하면 백엔드가 검증 후 우리 JWT를 발급.
      properties:
        idToken: { type: string }
      required: [idToken]

    RefreshRequest:
      type: object
      properties:
        refreshToken: { type: string }
      required: [refreshToken]

    LogoutRequest:
      type: object
      properties:
        refreshToken: { type: string }
      required: [refreshToken]

    # ---------- Therapist Verification ----------
    TherapistVerificationApplyRequest:
      type: object
      properties:
        licenseCode: { type: string, example: "LICENSE-2026-000123" }
      required: [licenseCode]

    TherapistVerificationResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        status: { $ref: "#/components/schemas/TherapistVerifStatus" }
        createdAt: { type: string, format: date-time }
        reviewedBy: { type: integer, format: int64, nullable: true }
        reviewedAt: { type: string, format: date-time, nullable: true }
        rejectReason: { type: string, nullable: true }
      required: [id, userId, status, createdAt]

    AdminRejectRequest:
      type: object
      properties:
        rejectReason: { type: string, example: "인증 코드 형식이 올바르지 않습니다." }
      required: [rejectReason]

    # ---------- Posts ----------
    PostCreateRequest:
      type: object
      properties:
        board: { $ref: "#/components/schemas/BoardType" }
        title: { type: string, example: "감각통합 활동 자료 공유" }
        content: { type: string, example: "내용..." }
        therapyArea: { $ref: "#/components/schemas/TherapyArea" }
        ageGroup: { $ref: "#/components/schemas/AgeGroup" }
      required: [board, title, content]

    PostUpdateRequest:
      type: object
      properties:
        title: { type: string }
        content: { type: string }
        therapyArea: { $ref: "#/components/schemas/TherapyArea" }
        ageGroup: { $ref: "#/components/schemas/AgeGroup" }

    PostSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        board: { $ref: "#/components/schemas/BoardType" }
        title: { type: string }
        therapyArea: { $ref: "#/components/schemas/TherapyArea" }
        ageGroup: { $ref: "#/components/schemas/AgeGroup" }
        viewCount: { type: integer, format: int64 }
        commentCount: { type: integer }
        likeCount: { type: integer }
        dislikeCount: { type: integer }
        author:
          $ref: "#/components/schemas/UserSummary"
          description: anonymous_board일 경우 마스킹된 author가 내려올 수 있음.
        createdAt: { type: string, format: date-time }
      required: [id, board, title, viewCount, commentCount, likeCount, dislikeCount, author, createdAt]

    PostDetail:
      allOf:
        - $ref: "#/components/schemas/PostSummary"
        - type: object
          properties:
            content: { type: string }
            updatedAt: { type: string, format: date-time }
            myReactionType:
              $ref: "#/components/schemas/ReactionType"
              nullable: true
            scrapped: { type: boolean, example: true }
          required: [content, scrapped]

    PaginatedPosts:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PostSummary" }
        page: { $ref: "#/components/schemas/PageMeta" }
      required: [items, page]

    # ---------- Comments ----------
    CommentCreateRequest:
      type: object
      properties:
        content: { type: string, example: "좋은 자료네요!" }
        parentCommentId:
          type: integer
          format: int64
          nullable: true
          description: 대댓글이면 부모 댓글 ID
      required: [content]

    CommentUpdateRequest:
      type: object
      properties:
        content: { type: string }
      required: [content]

    CommentResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        postId: { type: integer, format: int64 }
        author:
          $ref: "#/components/schemas/UserSummary"
          description: 삭제된 댓글이라도 작성자 정보는 유지할지 정책 선택 가능.
        parentCommentId: { type: integer, format: int64, nullable: true }
        content:
          type: string
          nullable: true
          description: soft delete된 댓글은 null 또는 "삭제된 댓글입니다"로 내려도 됨(정책 택1)
        deleted: { type: boolean, example: false }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, postId, author, deleted, createdAt, updatedAt]

    # ---------- Reaction / Scrap ----------
    UpsertReactionRequest:
      type: object
      properties:
        reactionType: { $ref: "#/components/schemas/ReactionType" }
      required: [reactionType]

    MyReactionResponse:
      type: object
      properties:
        reactionType:
          $ref: "#/components/schemas/ReactionType"
          nullable: true
      required: [reactionType]

    ScrapStatusResponse:
      type: object
      properties:
        scrapped: { type: boolean }
      required: [scrapped]

    PaginatedScraps:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PostSummary" }
        page: { $ref: "#/components/schemas/PageMeta" }
      required: [items, page]

    # ---------- Admin ----------
    PaginatedTherapistVerifications:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/TherapistVerificationResponse" }
        page: { $ref: "#/components/schemas/PageMeta" }
      required: [items, page]

    AdminLog:
      type: object
      properties:
        id: { type: integer, format: int64 }
        adminId: { type: integer, format: int64 }
        action: { type: string, example: "THERAPIST_APPROVED" }
        targetUserId: { type: integer, format: int64, nullable: true }
        therapistVerificationId: { type: integer, format: int64, nullable: true }
        memo: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, adminId, action, createdAt]

    PaginatedAdminLogs:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminLog" }
        page: { $ref: "#/components/schemas/PageMeta" }
      required: [items, page]

        HomeSectionKey:
      type: string
      enum:
        - POPULAR_THERAPY
        - WEEKLY_DOCUMENTS
        - LATEST_ANONYMOUS
      description: 홈 섹션 구분 키

    HomeViewer:
      type: object
      description: |-
        /home은 인증이 선택(optional)이라 viewer 정보는 최소 형태로 제공.
        - ANON이면 authenticated=false, role=null
        - USER/THERAPIST/ADMIN이면 authenticated=true + role 포함
      properties:
        authenticated:
          type: boolean
          example: true
        role:
          $ref: "#/components/schemas/UserRole"
          nullable: true
        nickname:
          type: string
          nullable: true
          example: "홍길동"
        profileImageUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/p/1.png"
        canAccessCommunity:
          type: boolean
          description: role이 THERAPIST 또는 ADMIN이면 true
          example: false
        therapistVerification:
          $ref: "#/components/schemas/TherapistVerificationMyStatus"
      required: [authenticated, canAccessCommunity]

    HomeSection:
      type: object
      description: |-
        locked=true이면 items는 비어있고(또는 최소 정보만), 프론트는 placeholderCount만큼 스켈레톤 렌더링 권장.
      properties:
        key:
          $ref: "#/components/schemas/HomeSectionKey"
        title:
          type: string
          example: "인기 임상톡톡"
        board:
          $ref: "#/components/schemas/BoardType"
        sort:
          $ref: "#/components/schemas/PostSort"
        locked:
          type: boolean
          example: true
        lockedReason:
          type: string
          nullable: true
          example: "THERAPIST_REQUIRED"
        placeholderCount:
          type: integer
          example: 3
          description: locked 상태에서 프론트 스켈레톤 개수(또는 고정 박스 렌더링 개수)
        items:
          type: array
          items:
            $ref: "#/components/schemas/PostSummary"
      required: [key, title, board, sort, locked, placeholderCount, items]

    HomeResponse:
      type: object
      properties:
        viewer:
          $ref: "#/components/schemas/HomeViewer"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/HomeSection"
      required: [viewer, sections]

paths:
  # ---------- Meta ----------
  /meta/options:
    get:
      tags: [Meta]
      summary: 옵션(보드/치료영역/나이대/리액션) 목록 조회
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MetaOptionsResponse" }

  # ---------- Auth ----------
  /auth/signup:
    post:
      tags: [Auth]
      summary: 이메일 회원가입 + JWT 발급
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409":
          $ref: "#/components/responses/ConflictError"

  /auth/login:
    post:
      tags: [Auth]
      summary: 이메일 로그인 + JWT 발급
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/oauth/google:
    post:
      tags: [Auth]
      summary: 구글 ID Token 로그인/회원가입 + JWT 발급
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoogleLoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Access Token 재발급(Refresh Token 사용)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: OK (회전 정책이면 refreshToken도 새 값으로 내려줌)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tokens" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃(Refresh Token revoke)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  # ---------- Me ----------
  /me:
    get:
      tags: [Me]
      summary: 내 정보 조회
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    patch:
      tags: [Me]
      summary: 내 프로필 수정(닉네임/프로필 이미지 URL)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /me/posts:
    get:
      tags: [Me]
      summary: 내가 작성한 게시글 목록(마이페이지)
      description: THERAPIST/ADMIN 전용 권장(작성 권한이 있으므로)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedPosts" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /me/scraps:
    get:
      tags: [Scraps]
      summary: 내 스크랩 목록(마이페이지)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedScraps" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  # ---------- Therapist Verification ----------
  /therapist-verifications:
    post:
      tags: [TherapistVerification]
      summary: 치료사 인증 신청(license_code 제출)
      description: |-
        권장 정책:
        - USER만 신청 가능
        - THERAPIST면 409
        - licenseCode 중복이면 409
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TherapistVerificationApplyRequest" }
      responses:
        "201":
          description: Created (status=PENDING)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TherapistVerificationResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /therapist-verifications/me:
    get:
      tags: [TherapistVerification]
      summary: 내 치료사 인증 상태(최근 1건)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK (신청 이력 없으면 null)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TherapistVerificationMyStatus" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  # ---------- Admin ----------
  /admin/therapist-verifications:
    get:
      tags: [Admin]
      summary: 치료사 인증 신청 목록 조회(관리자)
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/TherapistVerifStatus" }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedTherapistVerifications" }
