  /home:
  get:
    tags: [Home]
    summary: 홈 화면 통합 데이터(섹션 한번에)
    description: |-
      홈 화면(인기 임상톡톡 / 이 주의 자료 / 익명 게시판 등) 섹션을 한 번에 내려준다.

      ✅ Authorization은 선택(Optional)이다.
      - ANON(토큰 없음): viewer.authenticated=false, sections locked=true, items=[]
      - USER: viewer.authenticated=true(role=USER), sections locked=true, items=[]
      - THERAPIST/ADMIN: locked=false, items에 PostSummary 배열 제공

      프론트는 locked=true일 때 placeholderCount만큼 스켈레톤/블러 카드 렌더링 후
      "치료사 인증 필요" CTA를 띄우는 방식 추천.
    security:
      - BearerAuth: []
      - {}   # <- 이게 Optional Auth 포인트(토큰 있어도 되고 없어도 됨)
    parameters:
      - name: therapyLimit
        in: query
        description: 인기 임상톡톡(therapy_board) 아이템 개수
        schema: { type: integer, default: 3, minimum: 1, maximum: 20 }
      - name: documentLimit
        in: query
        description: 이 주의 자료(document_board) 아이템 개수
        schema: { type: integer, default: 6, minimum: 1, maximum: 20 }
      - name: anonymousLimit
        in: query
        description: 최신 익명(anonymous_board) 아이템 개수
        schema: { type: integer, default: 6, minimum: 0, maximum: 20 }
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HomeResponse"
            examples:
              anon:
                summary: ANON(비로그인) 예시
                value:
                  viewer:
                    authenticated: false
                    role: null
                    nickname: null
                    profileImageUrl: null
                    canAccessCommunity: false
                    therapistVerification: null
                  sections:
                    - key: POPULAR_THERAPY
                      title: "인기 임상톡톡"
                      board: therapy_board
                      sort: MOST_VIEWED
                      locked: true
                      lockedReason: "LOGIN_REQUIRED"
                      placeholderCount: 3
                      items: []
                    - key: WEEKLY_DOCUMENTS
                      title: "이 주의 자료"
                      board: document_board
                      sort: LATEST
                      locked: true
                      lockedReason: "LOGIN_REQUIRED"
                      placeholderCount: 6
                      items: []
                    - key: LATEST_ANONYMOUS
                      title: "익명 게시판"
                      board: anonymous_board
                      sort: LATEST
                      locked: true
                      lockedReason: "LOGIN_REQUIRED"
                      placeholderCount: 6
                      items: []
              user:
                summary: USER(로그인/미인증) 예시
                value:
                  viewer:
                    authenticated: true
                    role: USER
                    nickname: "홍길동"
                    profileImageUrl: "https://cdn.example.com/p/1.png"
                    canAccessCommunity: false
                    therapistVerification:
                      id: 10
                      status: PENDING
                      createdAt: "2026-02-26T10:00:00Z"
                      reviewedAt: null
                      rejectReason: null
                  sections:
                    - key: POPULAR_THERAPY
                      title: "인기 임상톡톡"
                      board: therapy_board
                      sort: MOST_VIEWED
                      locked: true
                      lockedReason: "THERAPIST_REQUIRED"
                      placeholderCount: 3
                      items: []
                    - key: WEEKLY_DOCUMENTS
                      title: "이 주의 자료"
                      board: document_board
                      sort: LATEST
                      locked: true
                      lockedReason: "THERAPIST_REQUIRED"
                      placeholderCount: 6
                      items: []
                    - key: LATEST_ANONYMOUS
                      title: "익명 게시판"
                      board: anonymous_board
                      sort: LATEST
                      locked: true
                      lockedReason: "THERAPIST_REQUIRED"
                      placeholderCount: 6
                      items: []
      "401":
        $ref: "#/components/responses/UnauthorizedError"